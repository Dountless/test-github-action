name: MyworkflowforTest

on:
    [push]

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checout Code
              uses: actions/checkout@v6

            - name: print file
              run: ls -ltra

            - name: Install CowSay Programm
              run: sudo apt-get install cowsay -y 

            - name: Generate ArtWork
              run: cowsay -f dragon "Hello DEEPAK I am Dragon... " >> dragon.txt

            - name: Upload Artiface
              uses: actions/upload-artifact@v4
              with:
                name: dragonfile
                path: ./dragon.txt

    Test:
        needs: build
        runs-on: ubuntu-latest
        steps:
            - name: Chelout
              uses: actions/checkout@v6

            - uses: actions/download-artifact@v5
              name: Download Dragon file
              with:
                name: dragonfile

            - name: print 
              run: ls -ltra

            - name: print dragonfile
              run: cat dragon.txt

              